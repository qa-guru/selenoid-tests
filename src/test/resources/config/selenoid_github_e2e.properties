# selenoid_github — e2e (@Layer(e2e) — smoke via -DincludeTags=smoke -DexcludeTags=visual)
# gradle test -Denv=selenoid_github_e2e -DincludeTags=smoke -DexcludeTags=visual -Djunit.jupiter.execution.parallel.config.fixed.parallelism=3

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app
# baseUrl=
# basePath=

# Selenoid hub
hubUrl=http://127.0.0.1:4444/
uiUrl=http://127.0.0.1:8080/
smokeUrl=https://example.com/

# Playwright session
playwrightWsEndpoint=ws://127.0.0.1:4444/playwright/playwright-chromium/1.61.1
playwrightSessionName=java-playwright-tests
playwrightSessionTimeout=5m
playwrightEnableVnc=false
playwrightEnableVideo=false

# Browser configuration
browser=chrome
browserVersion=148.0
browserSize=1920x1280
headless=true
closeBrowserAfterEach=false
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
videoFolder=http://127.0.0.1:4444/video/
remoteUrl=http://127.0.0.1:4444/wd/hub

# Console log
logToConsole=false
selenideLogToConsole=false
rootLogLevel=info
