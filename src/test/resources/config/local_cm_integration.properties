# CM installer lifecycle (@Tag(cm) @Tag(local-only)) — ports offset from dev stack (:4444/:8080)
# ./gradlew testCmIntegration -DskipHealthCheck=true
# Prerequisite: go build -o cm ../cm ; Docker ; selenoid-ui ui/build (dev/scripts/build-selenoid-ui.sh)

hubUrl=http://127.0.0.1:4445/
uiUrl=http://127.0.0.1:8081/
apiBaseUrl=
remoteUrl=http://127.0.0.1:4445/wd/hub
cmHubPort=4445
cmUiPort=8081
smokeUrl=https://example.com/

browser=chrome
browserVersion=148.0
browserSize=1920x1080
headless=true
closeBrowserAfterEach=true

enableVnc=false
enableVideo=false

cmBinaryPath=../cm/cm
cmBrowsersJson=../dev/browsers.json
cmUseLocalBinaries=false

logToConsole=true
selenideLogToConsole=false
