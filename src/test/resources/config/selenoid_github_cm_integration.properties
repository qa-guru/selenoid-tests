# selenoid_github — CM installer (@Tag(cm)) on offset ports :4445/:8081
# ./gradlew testCmIntegration -DpyramidStand=selenoid_github -DskipHealthCheck=true
# Prerequisite: scripts/prepare-ci-cm-workspace.sh (+ start-ci-cm-stack.sh for @Tag(api,cm))

hubUrl=http://127.0.0.1:4445/
uiUrl=http://127.0.0.1:8081/
apiBaseUrl=
remoteUrl=http://127.0.0.1:4445/wd/hub
cmHubPort=4445
cmUiPort=8081
smokeUrl=https://example.com/

browser=chrome
browserVersion=148.0-min
browserSize=1920x1280
headless=true
closeBrowserAfterEach=true

enableVnc=false
enableVideo=false

cmBinaryPath=build/ci-bin/cm
cmSelenoidBinary=build/ci-bin/selenoid
cmSelenoidUiBinary=build/ci-bin/selenoid-ui
cmBrowsersJson=fixtures/ci-browsers.json
cmUseLocalBinaries=true

logToConsole=false
selenideLogToConsole=false
rootLogLevel=info
