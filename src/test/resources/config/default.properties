# Runtime defaults — values match @DefaultValue in TestConfig.java (Owner merge, lowest priority).
# SSOT structure: _ethalon.properties. Env profiles override via config/${env}.properties.

# Allure report
allureReportMode=allure3
allureAgentMode=none

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app (Selenide e2e — frontend/ harness)
baseUrl=
basePath=

# REST API (@Layer api — Rest Assured; empty → hubUrl)
apiBaseUrl=

# Selenoid hub (hub smoke, selenoid-home; local: dev/scripts/start-selenoid.sh)
hubUrl=http://127.0.0.1:4444/
uiUrl=http://127.0.0.1:8080/
smokeUrl=https://example.com/

# Playwright session (Java + Playwright via Selenoid hub)
playwrightWsEndpoint=ws://127.0.0.1:4444/playwright/playwright-chromium/1.61.1
playwrightSessionName=java-playwright-tests
playwrightSessionTimeout=5m
playwrightEnableVnc=false
playwrightEnableVideo=false

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1920x1280
headless=false
closeBrowserAfterEach=false
closeBrowserAfterAll=true

# Remote browser hub configuration (Selenide remoteUrl / selenoid:options)
enableHar=false
enableVnc=false
enableVideo=false
remoteUrl=
videoFolder=

# Visual baselines (@Tag visual)
updateBaselines=false
baselinesDir=screenshots
visualDiffThreshold=0.015

# Console log
logToConsole=true
selenideLogToConsole=true
rootLogLevel=info
