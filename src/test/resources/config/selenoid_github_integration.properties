# selenoid_github — integration (@Layer(integration) @Tag(integration))
# ./gradlew test -Denv=selenoid_github_integration -DincludeTags=integration -DskipHealthCheck=true

hubUrl=http://127.0.0.1:4444/
uiUrl=http://127.0.0.1:8080/
apiBaseUrl=
smokeUrl=https://example.com/

browser=chrome
browserVersion=148
browserSize=1920x1280
headless=true
closeBrowserAfterAll=true

remoteUrl=http://127.0.0.1:4444/wd/hub

