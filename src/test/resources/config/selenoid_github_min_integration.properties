# selenoid_github — Playwright-chromium-min (@Tag(min) — не в default smoke)
# ./gradlew test -Denv=selenoid_github_min_integration -DincludeTags=min -DskipHealthCheck=true

hubUrl=http://127.0.0.1:4444/
uiUrl=http://127.0.0.1:8080/
apiBaseUrl=
smokeUrl=https://example.com/

browser=chrome
browserVersion=149.0
browserSize=1920x1280
headless=true

remoteUrl=http://127.0.0.1:4444/wd/hub

# Playwright session (ws://127.0.0.1:4444/playwright/playwright-chromium/1.61.1-min)
playwrightWsEndpoint=ws://127.0.0.1:4444/playwright/playwright-chromium/1.61.1-min
playwrightSessionName=java-playwright-min-integration
playwrightSessionTimeout=5m
playwrightEnableVnc=false
playwrightEnableVideo=false

logToConsole=false
selenideLogToConsole=false
rootLogLevel=info
