# Synced from ethalon: selenoid_github-orchestrator.yml (SSOT generators/ethalon/tests-java/.github/_ethalon/)
# Runnable filename = ethalon filename. Default: -Denv=selenoid_github_e2e
# SSOT: GitHub Actions workflow ‚Äî env_base selenoid_github, suffix -orchestrator (multi-source CI).
# –ò–º–µ–Ω–æ–≤–∞–Ω–∏–µ: {env_base}-orchestrator.yml ‚Äî Go unit matrix + Java hub/CM tests + merge Allure + repository_dispatch.
# –ö–æ–ø–∏—Ä–æ–≤–∞—Ç—å –≤ consumer: .github/workflows/ ‚Äî skill sync-github-workflows-ethalon.
# Consumer reference: qa-guru-home/selenoid-home/selenoid-tests (run-go-unit.sh, start-ci-selenoid-stack.sh, run-ci-cm-tests.sh).
#
# workflow name: = GitHub repo slug + " Tests" (–∫–∞–Ω–æ–Ω test-layers). Reference consumer: selenoid-tests.
# Default: -Denv=selenoid_github_e2e. GRADLE_ARGS: env, skipHealthCheck, tags only ‚Äî –Ω–µ –¥—É–±–ª–∏—Ä–æ–≤–∞—Ç—å profile keys.

name: selenoid-tests Tests

on:
  workflow_dispatch:
    inputs:
      env_profile:
        description: "Env profile (-Denv=), e.g. selenoid_github_e2e"
        required: false
        default: selenoid_github_e2e
      test_class:
        description: "Fully qualified test (optional), e.g. tests.api.HubStatusTests"
        required: false
      test_tags:
        description: "JUnit tags (comma-separated); empty = smoke,api; e.g. integration"
        required: false
      source_ref:
        description: "Git ref for Go service repos (default main)"
        required: false
        default: main
      source_repo:
        description: "Triggering repository (repository_dispatch)"
        required: false
      source_version:
        description: "Deployed version (repository_dispatch)"
        required: false
      source_variant:
        description: "Deploy variant (repository_dispatch), e.g. webdriver"
        required: false
      source_browser:
        description: "WebDriver browser (repository_dispatch), e.g. chrome|firefox|msedge"
        required: false
      webdriver_variant:
        description: "WebDriver image variant (repository_dispatch), e.g. warm|min"
        required: false
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy-smoke]

concurrency:
  group: selenoid_github-orchestrator-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  ALLURE_ENDPOINT: ${{ vars.ALLURE_ENDPOINT || 'https://allure.autotests.cloud' }}
  REPORT_ID: ${{ github.run_id }}
  ENV_PROFILE: ${{ github.event.client_payload.env_profile || github.event.inputs.env_profile || 'selenoid_github_e2e' }}
  SOURCE_REPO: ${{ github.event.client_payload.source_repo || github.event.inputs.source_repo || '' }}
  SOURCE_VERSION: ${{ github.event.client_payload.source_version || github.event.inputs.source_version || '' }}
  SOURCE_VARIANT: ${{ github.event.client_payload.source_variant || github.event.inputs.source_variant || '' }}
  SOURCE_BROWSER: ${{ github.event.client_payload.source_browser || github.event.inputs.source_browser || '' }}
  WEBDRIVER_VARIANT: ${{ github.event.client_payload.webdriver_variant || github.event.inputs.webdriver_variant || '' }}
  SOURCE_REF: ${{ github.event.client_payload.source_ref || github.event.inputs.source_ref || 'main' }}
  TRIGGER_RUN_ID: ${{ github.event.client_payload.trigger_run_id || '' }}
  PROD_CLOUD_STAND: ${{ startsWith(github.event.client_payload.env_profile || github.event.inputs.env_profile || 'selenoid_github_e2e', 'selenoid_autotests_cloud') && 'true' || 'false' }}

jobs:
  go-unit:
    if: github.event.client_payload.skip_go_unit != true
    name: Go unit ‚Äî ${{ matrix.repo }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOTOOLCHAIN: auto
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: selenoid
            epic: selenoid
            go_repo: qa-guru/selenoid
          - repo: selenoid-ui
            epic: selenoid-ui
            go_repo: qa-guru/selenoid-ui
          - repo: cm
            epic: cm
            go_repo: qa-guru/cm
    steps:
      - name: Checkout tests repo
        uses: actions/checkout@v7

      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.go_repo }}
          ref: ${{ env.SOURCE_REF }}
          path: repos/${{ matrix.repo }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: repos/${{ matrix.repo }}/go.mod
          cache-dependency-path: repos/${{ matrix.repo }}/go.sum

      - name: Setup Node 12 (selenoid-ui yarn)
        if: matrix.repo == 'selenoid-ui'
        uses: actions/setup-node@v6
        with:
          node-version: 12.x
          cache: yarn
          cache-dependency-path: repos/selenoid-ui/ui/yarn.lock

      - name: Build selenoid-ui frontend
        if: matrix.repo == 'selenoid-ui'
        working-directory: repos/selenoid-ui/ui
        env:
          CI: false
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Setup Node 24 (Allure JUnit conversion)
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Go unit tests ‚Üí Allure
        id: go-tests
        run: |
          set +e
          chmod +x scripts/run-go-unit.sh
          ./scripts/run-go-unit.sh "${{ matrix.repo }}" "${{ matrix.epic }}"
          echo "GO_TEST_EXIT=$?" >> "$GITHUB_ENV"
          set -e

      - name: Upload Allure results
        if: always() && hashFiles(format('build/allure-results/go-{0}/**', matrix.repo)) != ''
        uses: actions/upload-artifact@v7
        with:
          name: allure-go-${{ matrix.repo }}
          path: build/allure-results/go-${{ matrix.repo }}/
          retention-days: 7

      - name: Fail if Go tests failed
        if: always() && env.GO_TEST_EXIT != '0'
        run: exit "${{ env.GO_TEST_EXIT }}"

  java-e2e:
    name: Java hub tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ALLURE_RESULTS: build/allure-results
      TEST_CLASS: ${{ github.event.inputs.test_class || '' }}
      TEST_TAGS: ${{ github.event.client_payload.test_tags || github.event.inputs.test_tags || '' }}
      GOTOOLCHAIN: auto
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout selenoid
        if: env.PROD_CLOUD_STAND != 'true'
        uses: actions/checkout@v7
        with:
          repository: qa-guru/selenoid
          ref: ${{ env.SOURCE_REF }}
          path: repos/selenoid

      - name: Checkout selenoid-ui
        if: env.PROD_CLOUD_STAND != 'true'
        uses: actions/checkout@v7
        with:
          repository: qa-guru/selenoid-ui
          ref: ${{ env.SOURCE_REF }}
          path: repos/selenoid-ui

      - name: Setup Go
        if: env.PROD_CLOUD_STAND != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: repos/selenoid/go.mod
          cache-dependency-path: |
            repos/selenoid/go.sum
            repos/selenoid-ui/go.sum

      - name: Setup Node 12 (selenoid-ui yarn)
        if: env.PROD_CLOUD_STAND != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 12.x
          cache: yarn
          cache-dependency-path: repos/selenoid-ui/ui/yarn.lock

      - name: Start Selenoid stack for hub tests
        if: env.PROD_CLOUD_STAND != 'true'
        run: |
          chmod +x scripts/start-ci-selenoid-stack.sh
          ./scripts/start-ci-selenoid-stack.sh

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Run Java hub tests
        run: |
          set +e
          GRADLE_ARGS=(
            -Denv="${ENV_PROFILE}"
            -DskipHealthCheck=true
          )
          if [[ "${ENV_PROFILE}" == selenoid_autotests_cloud_* ]]; then
            PYRAMID_STAND=selenoid_autotests_cloud
          else
            PYRAMID_STAND=selenoid_github
          fi
          GRADLE_PYRAMID=(
            -DpyramidStand="${PYRAMID_STAND}"
            -DskipHealthCheck=true
          )
          JAVA_TEST_EXIT=0
          if [ -n "$TEST_CLASS" ]; then
            ./gradlew test --tests "$TEST_CLASS" "${GRADLE_ARGS[@]}"
            JAVA_TEST_EXIT=$?
          elif [ -n "$TEST_TAGS" ]; then
            case "$TEST_TAGS" in
              integration)
                ./gradlew testIntegration "${GRADLE_PYRAMID[@]}"
                JAVA_TEST_EXIT=$?
                ;;
              api)
                ./gradlew testApi "${GRADLE_PYRAMID[@]}"
                JAVA_TEST_EXIT=$?
                ;;
              smoke)
                if [ "$SOURCE_VARIANT" = "webdriver" ]; then
                  case "$SOURCE_BROWSER" in
                    firefox)
                      ./gradlew testIntegration "${GRADLE_PYRAMID[@]}" \
                        --tests tests.integration.HubFirefoxSessionIntegrationTests
                      ;;
                    msedge)
                      ./gradlew testIntegration "${GRADLE_PYRAMID[@]}" \
                        --tests tests.integration.HubMsedgeSessionIntegrationTests
                      ;;
                    chrome)
                      if [ "$WEBDRIVER_VARIANT" = "min" ]; then
                        ./gradlew testIntegration "${GRADLE_PYRAMID[@]}" \
                          --tests tests.integration.HubChromeMinSessionTests
                      else
                        ./gradlew testWebdriverE2e "${GRADLE_PYRAMID[@]}"
                      fi
                      ;;
                    *)
                      ./gradlew testWebdriverE2e "${GRADLE_PYRAMID[@]}"
                      ;;
                  esac
                elif [ "$SOURCE_VARIANT" = "video-recorder" ]; then
                  ./gradlew testVideoRecorder "${GRADLE_PYRAMID[@]}"
                elif [ "$SOURCE_REPO" = "qa-guru/selenoid-ui" ]; then
                  ./gradlew testUiE2e "${GRADLE_PYRAMID[@]}"
                else
                  ./gradlew testE2e "${GRADLE_PYRAMID[@]}"
                fi
                JAVA_TEST_EXIT=$?
                ;;
              playwright)
                ./gradlew testPlaywright "${GRADLE_PYRAMID[@]}"
                JAVA_TEST_EXIT=$?
                ;;
              cm)
                echo "CM suite runs in java-cm job (testCmIntegration + testCmApi + testCmE2e)"
                JAVA_TEST_EXIT=0
                ;;
              api,smoke)
                # Release smoke: pyramid slices exclude @Tag(cm) ‚Äî raw includeTags=api,smoke pulls CM installer/API on prod.
                ./gradlew testApi testE2e "${GRADLE_PYRAMID[@]}"
                JAVA_TEST_EXIT=$?
                ;;
              *)
                ./gradlew test "${GRADLE_ARGS[@]}" \
                  -DincludeTags="$TEST_TAGS"
                JAVA_TEST_EXIT=$?
                ;;
            esac
          elif [ "$ENV_PROFILE" = "selenoid_github_integration" ]; then
            ./gradlew testIntegration "${GRADLE_PYRAMID[@]}"
            JAVA_TEST_EXIT=$?
          elif [ "$ENV_PROFILE" = "selenoid_github_api" ]; then
            ./gradlew testApi "${GRADLE_PYRAMID[@]}"
            JAVA_TEST_EXIT=$?
          elif [ "$ENV_PROFILE" = "selenoid_github_e2e" ]; then
            ./gradlew testHubAll "${GRADLE_PYRAMID[@]}"
            JAVA_TEST_EXIT=$?
          else
            ./gradlew testHubAll "${GRADLE_PYRAMID[@]}"
            JAVA_TEST_EXIT=$?
          fi
          echo "JAVA_TEST_EXIT=${JAVA_TEST_EXIT}" >> "$GITHUB_ENV"
          set -e

      - name: Upload Allure results
        if: always() && hashFiles('build/allure-results/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: allure-java
          path: build/allure-results/
          retention-days: 7

      - name: Fail if Java tests failed
        if: always() && env.JAVA_TEST_EXIT != '0'
        run: exit "${{ env.JAVA_TEST_EXIT }}"

  java-cm:
    name: Java CM integration
    if: ${{ !startsWith(github.event.client_payload.env_profile || github.event.inputs.env_profile || 'selenoid_github_e2e', 'selenoid_autotests_cloud') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ALLURE_RESULTS: build/allure-results
      GOTOOLCHAIN: auto
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout cm
        uses: actions/checkout@v7
        with:
          repository: qa-guru/cm
          ref: ${{ env.SOURCE_REF }}
          path: repos/cm

      - name: Checkout selenoid
        uses: actions/checkout@v7
        with:
          repository: qa-guru/selenoid
          ref: ${{ env.SOURCE_REF }}
          path: repos/selenoid

      - name: Checkout selenoid-ui
        uses: actions/checkout@v7
        with:
          repository: qa-guru/selenoid-ui
          ref: ${{ env.SOURCE_REF }}
          path: repos/selenoid-ui

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: repos/cm/go.mod
          cache-dependency-path: |
            repos/cm/go.sum
            repos/selenoid/go.sum
            repos/selenoid-ui/go.sum

      - name: Setup Node 12 (selenoid-ui yarn)
        uses: actions/setup-node@v6
        with:
          node-version: 12.x
          cache: yarn
          cache-dependency-path: repos/selenoid-ui/ui/yarn.lock

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Run CM integration tests
        run: |
          set +e
          chmod +x scripts/run-ci-cm-tests.sh
          ./scripts/run-ci-cm-tests.sh
          echo "CM_TEST_EXIT=$?" >> "$GITHUB_ENV"
          set -e

      - name: Upload Allure results
        if: always() && hashFiles('build/allure-results/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: allure-java-cm
          path: build/allure-results/
          retention-days: 7

      - name: Fail if CM tests failed
        if: always() && env.CM_TEST_EXIT != '0'
        run: exit "${{ env.CM_TEST_EXIT }}"

  report:
    name: Allure report + TestOps
    needs: [go-unit, java-e2e, java-cm]
    if: always() && !cancelled() && (needs.java-cm.result == 'success' || needs.java-cm.result == 'skipped' || needs.java-cm.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ALLURE_RESULTS: build/allure-results
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Load Allure history
        uses: actions/checkout@v7
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          sparse-checkout: history.jsonl
          sparse-checkout-cone-mode: false

      - name: Download Go Allure artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: allure-go-*
          path: build/allure-results
          merge-multiple: true

      - name: Download Java Allure artifacts
        uses: actions/download-artifact@v8
        with:
          name: allure-java
          path: build/allure-results
          merge-multiple: true

      - name: Download Java CM Allure artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: allure-java-cm
          path: build/allure-results
          merge-multiple: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Restore Allure history
        run: |
          if [ -f gh-pages/history.jsonl ]; then
            cp gh-pages/history.jsonl history.jsonl
          fi

      - name: Install allurectl
        if: vars.ALLURE_PROJECT_ID != ''
        continue-on-error: true
        id: setup-allurectl
        uses: allure-framework/setup-allurectl@v1
        with:
          allure-endpoint: ${{ env.ALLURE_ENDPOINT }}
          allure-token: ${{ secrets.ALLURE_TOKEN }}
          allure-project-id: ${{ vars.ALLURE_PROJECT_ID }}

      - name: Write executor.json
        if: hashFiles('build/allure-results/**') != ''
        run: |
          mkdir -p build/allure-results
          SOURCE_JSON=""
          if [ -n "${SOURCE_REPO:-}" ]; then
            SOURCE_JSON=$(printf ', "source_repo": "%s", "source_version": "%s"' "$SOURCE_REPO" "$SOURCE_VERSION")
          fi
          cat > build/allure-results/executor.json <<EOF
          {
            "reportName": "Run #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/awesome/index.html",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"${SOURCE_JSON}
          }
          EOF

      - name: Validate allurerc.mjs
        run: node scripts/validate-allurerc.mjs allurerc.mjs

      - name: Allure 3 quality gate + report
        if: always() && hashFiles('build/allure-results/**') != ''
        id: allure-report
        continue-on-error: true
        run: |
          set +e
          ./gradlew allureQualityGate
          echo "QUALITY_GATE_EXIT=$?" >> "$GITHUB_ENV"
          ./gradlew allureReport
          set -e

      - name: Verify Allure awesome section chunks
        if: always() && steps.allure-report.outcome == 'success' && hashFiles('build/reports/allure-report/allureReport/awesome/index.html') != ''
        run: |
          AWESOME=build/reports/allure-report/allureReport/awesome
          APP=$(ls "$AWESOME"/app-*.js | head -1)
          missing=0
          for chunk_id in $(rg -o 'a\.e\((\d+)\)' "$APP" -r '$1' | sort -u); do
            if ! ls "$AWESOME/${chunk_id}.app-"*.js >/dev/null 2>&1; then
              echo "::error::Missing lazy-load chunk ${chunk_id}.app-*.js in $AWESOME (Graphs/Timeline fall back to test tree)"
              missing=1
            fi
          done
          test "$missing" -eq 0

      - name: Generate README dashboard assets
        if: always() && steps.allure-report.outcome == 'success' && hashFiles('build/allure-results/**') != ''
        run: |
          mkdir -p pages/readme
          BUILD="#${{ github.run_number }}"
          GEN=".github/scripts/generate-readme-badge.sh"
          gen() {
            bash "${GEN}" build/allure-results pages/readme main "${BUILD}" "$@"
          }
          gen "" "Selenoid Stack" "Go 1.26 ¬∑ Java 21 ¬∑ Allure 3" ""
          gen selenoid "Selenoid Hub" "Go 1.26 ¬∑ Docker API 1.45 ¬∑ Allure 3" selenoid
          gen selenoid-ui "Selenoid UI" "Go ¬∑ React ¬∑ Allure 3" selenoid-ui
          gen cm "Configuration Manager" "Go ¬∑ Allure 3" cm
          gen webdriver-image "WebDriver Nodes" "Docker ¬∑ Allure 3" webdriver-image
          gen playwright-image "Playwright Nodes" "Docker ¬∑ Allure 3" playwright-image

      - name: Prepare GitHub Pages
        if: always() && steps.allure-report.outcome == 'success' && hashFiles('build/reports/allure-report/allureReport/awesome/index.html') != ''
        run: |
          mkdir -p pages/reports/${REPORT_ID}
          cp -r build/reports/allure-report/allureReport/. "pages/reports/${REPORT_ID}/"
          rm -rf pages/reports/latest
          cp -r "pages/reports/${REPORT_ID}" pages/reports/latest
          if [ -f history.jsonl ]; then
            cp history.jsonl pages/history.jsonl
          elif [ -f build/reports/allure-report/allureReport/history.jsonl ]; then
            cp build/reports/allure-report/allureReport/history.jsonl pages/history.jsonl
          fi
          echo "${REPORT_ID}" > pages/latest-run-id.txt
          touch pages/.nojekyll

      - name: Setup Node for dashboard preview capture
        if: always() && steps.allure-report.outcome == 'success' && hashFiles('pages/reports/latest/dashboard/index.html') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Capture dashboard preview for README
        if: always() && steps.allure-report.outcome == 'success' && hashFiles('pages/reports/latest/dashboard/index.html') != ''
        continue-on-error: true
        run: |
          npm install --no-save playwright@1.50.1
          npx playwright install chromium --with-deps
          npx --yes serve pages -l 8765 >/tmp/serve.log 2>&1 &
          SERVE_PID=$!
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:8765/reports/latest/dashboard/ >/dev/null && break
            sleep 1
          done
          PREVIEW_URL="http://127.0.0.1:8765/reports/latest/dashboard/" \
            PREVIEW_OUTPUT_DIR="pages/readme" \
            node .github/scripts/capture-dashboard-preview.mjs
          bash .github/scripts/generate-component-dashboard-previews.sh build/allure-results pages/readme
          kill "${SERVE_PID}" || true

      - name: Deploy Allure report to GitHub Pages
        if: always() && hashFiles('pages/reports/**/awesome/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages
          enable_jekyll: false
          # Keep prior reports/<run-id>/ trees ‚Äî per-run URLs must stay stable.
          keep_files: true

      - name: Upload results to Allure TestOps
        if: always() && steps.setup-allurectl.outcome == 'success' && hashFiles('build/allure-results/**') != ''
        continue-on-error: true
        id: testops-upload
        env:
          ALLURE_PROJECT_ID: ${{ vars.ALLURE_PROJECT_ID }}
        run: |
          set +e
          if [ -n "$SOURCE_REPO" ]; then
            export ALLURE_LAUNCH_NAME="Deploy smoke ‚Äî ${SOURCE_REPO} ${SOURCE_VERSION} #${GITHUB_RUN_NUMBER}"
          else
            export ALLURE_LAUNCH_NAME="selenoid_github-orchestrator ‚Äî ${GITHUB_REPOSITORY} #${GITHUB_RUN_NUMBER}"
          fi
          allurectl upload build/allure-results 2>&1 | tee allurectl-upload.log
          UPLOAD_EXIT=${PIPESTATUS[0]}
          echo "TESTOPS_UPLOAD_EXIT=${UPLOAD_EXIT}" >> "$GITHUB_ENV"
          if [ "$UPLOAD_EXIT" -eq 0 ]; then
            LAUNCH_URL=$(grep -Eo 'https://[^ ]+/launch/[0-9]+' allurectl-upload.log | head -1 || true)
            if [ -z "$LAUNCH_URL" ] && allurectl job-run env >/tmp/allure-env 2>/dev/null; then
              # shellcheck disable=SC1091
              source /tmp/allure-env
              LAUNCH_URL="${ALLURE_LAUNCH_URL:-}"
            fi
            if [ -n "$LAUNCH_URL" ]; then
              echo "TESTOPS_LAUNCH_URL=${LAUNCH_URL}" >> "$GITHUB_ENV"
            fi
          fi
          set -e

      - name: Job summary
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/awesome/index.html"
          DASHBOARD_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/dashboard/index.html"
          echo "## selenoid-tests Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Env profile: \`${ENV_PROFILE}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SOURCE_REPO:-}" ]; then
            echo "- Trigger: \`${SOURCE_REPO}\` ${SOURCE_VERSION}" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "${SOURCE_VARIANT:-}" ]; then
              echo "- Variant: \`${SOURCE_VARIANT}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "${SOURCE_BROWSER:-}" ]; then
              echo "- Browser: \`${SOURCE_BROWSER}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "${WEBDRIVER_VARIANT:-}" ]; then
              echo "- WebDriver variant: \`${WEBDRIVER_VARIANT}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          echo "- Go unit: selenoid, selenoid-ui, cm (ref \`${SOURCE_REF}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Java hub push/default: \`testHubAll\` (unit‚Üícomponent‚Üíintegration‚Üíapi‚Üíe2e‚Üíwebdriver‚Üíui‚Üíplaywright‚Üíresilience‚Üímin)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Java CM push: \`testCmIntegration\` + \`testCmApi\` + \`testCmE2e\` (CM :4445/:8081)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dispatch slice: \`test_tags=integration|api|smoke|playwright\` ‚Üí one layer; \`smoke\` + \`source_variant=webdriver\` ‚Üí browser slice (\`testWebdriverE2e\` chrome warm, \`Hub*IntegrationTests\` firefox/msedge/min); \`smoke\` + \`source_variant=video-recorder\` ‚Üí \`testVideoRecorder\`; \`smoke\` + \`selenoid-ui\` ‚Üí \`testUiE2e\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- [GitHub Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -f build/reports/allure-report/allureReport/awesome/index.html ]; then
            echo "- [Allure 3 report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
            echo "- [Allure 3 dashboard](${DASHBOARD_URL})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Allure 3 report: _–Ω–µ —Å–æ–±—Ä–∞–Ω (–Ω–µ—Ç —Ä–µ–∑—É–ª—å—Ç–∞—Ç–æ–≤ –∏–ª–∏ –æ—à–∏–±–∫–∞ –≥–µ–Ω–µ—Ä–∞—Ü–∏–∏)_" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${TESTOPS_LAUNCH_URL:-}" ]; then
            echo "- [Allure TestOps launch](${TESTOPS_LAUNCH_URL})" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${TESTOPS_UPLOAD_EXIT:-}" != "" ] && [ "${TESTOPS_UPLOAD_EXIT}" != "0" ]; then
            echo "- Allure TestOps upload: _–æ—à–∏–±–∫–∞ (—Å–º. —à–∞–≥ Upload results)_" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${QUALITY_GATE_EXIT:-}" = "0" ]; then
            echo "- Allure 3 quality gate: passed" >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "${QUALITY_GATE_EXIT:-}" ]; then
            echo "- Allure 3 quality gate: **failed** (exit ${QUALITY_GATE_EXIT})" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify deploy-smoke trigger
        if: >-
          always() &&
          env.TRIGGER_RUN_ID != '' &&
          env.SOURCE_REPO != ''
        continue-on-error: true
        env:
          CALLBACK_TOKEN_PRIMARY: ${{ secrets.SELENOID_SMOKE_CALLBACK_TOKEN }}
          CALLBACK_TOKEN_FALLBACK: ${{ secrets.SELENOID_AUTOTESTS_CLOUD_DISPATCH_TOKEN }}
          JAVA_E2E_RESULT: ${{ needs.java-e2e.result }}
        run: |
          set -euo pipefail
          CALLBACK_TOKEN="${CALLBACK_TOKEN_PRIMARY:-${CALLBACK_TOKEN_FALLBACK}}"
          if [[ -z "${CALLBACK_TOKEN}" ]]; then
            echo "::warning::SELENOID_SMOKE_CALLBACK_TOKEN is not set; skipping smoke-complete callback."
            exit 0
          fi

          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/awesome/index.html"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ -f build/reports/allure-report/allureReport/awesome/index.html ]]; then
            report_built=true
          else
            report_built=false
          fi

          if [[ "${JAVA_E2E_RESULT}" == "success" && "${QUALITY_GATE_EXIT:-1}" == "0" && "${report_built}" == "true" ]]; then
            conclusion=success
          else
            conclusion=failure
          fi

          if [[ "${QUALITY_GATE_EXIT:-}" == "0" ]]; then
            quality_gate=passed
          elif [[ -n "${QUALITY_GATE_EXIT:-}" ]]; then
            quality_gate=failed
          else
            quality_gate=skipped
          fi

          passed=0
          failed=0
          broken=0
          skipped=0
          if [[ -d build/allure-results ]]; then
            while IFS= read -r status; do
              case "${status}" in
                passed) passed=$((passed + 1)) ;;
                failed) failed=$((failed + 1)) ;;
                broken) broken=$((broken + 1)) ;;
                skipped) skipped=$((skipped + 1)) ;;
              esac
            done < <(find build/allure-results -type f -name '*-result.json' -print0 2>/dev/null \
              | xargs -0 jq -r '.status // empty' 2>/dev/null || true)
          fi

          STATS="$(jq -nc \
            --argjson passed "${passed}" \
            --argjson failed "${failed}" \
            --argjson broken "${broken}" \
            --argjson skipped "${skipped}" \
            '{passed: $passed, failed: $failed, broken: $broken, skipped: $skipped}')"

          PAYLOAD="$(jq -n \
            --arg trigger_run_id "${TRIGGER_RUN_ID}" \
            --arg tests_run_id "${{ github.run_id }}" \
            --arg conclusion "${conclusion}" \
            --arg report_url "${REPORT_URL}" \
            --arg testops_url "${TESTOPS_LAUNCH_URL:-}" \
            --arg run_url "${RUN_URL}" \
            --arg report_built "${report_built}" \
            --arg quality_gate "${quality_gate}" \
            --argjson stats "${STATS}" \
            '{
              trigger_run_id: $trigger_run_id,
              tests_run_id: $tests_run_id,
              conclusion: $conclusion,
              report_url: $report_url,
              testops_url: $testops_url,
              run_url: $run_url,
              report_built: $report_built,
              quality_gate: $quality_gate,
              stats: $stats
            }')"

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${CALLBACK_TOKEN}" \
            "https://api.github.com/repos/${SOURCE_REPO}/dispatches" \
            -d "$(jq -n --argjson client_payload "${PAYLOAD}" '{event_type: "smoke-complete", client_payload: $client_payload}')"

      - name: Fail if quality gate failed
        if: always() && env.QUALITY_GATE_EXIT != '' && env.QUALITY_GATE_EXIT != '0'
        run: exit "${{ env.QUALITY_GATE_EXIT }}"

      - name: Fail if report was not generated
        if: always() && steps.allure-report.outcome != 'success'
        run: exit 1
